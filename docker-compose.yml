

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NASA_API_KEY=${NASA_API_KEY}
      - DATABASE_URL=sqlite:///./data/asteroides.db
      - ALLOWED_ORIGINS=http://localhost:5500,http://127.0.0.1:5500
      - LOG_DIR=/app/logs
    volumes:
      - asteroid_data:/app/data
      - asteroid_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl","-f","http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "5500:80"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  asteroid_data:
  asteroid_logs: