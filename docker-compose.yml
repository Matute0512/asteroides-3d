version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NASA_API_KEY=${NASA_API_KEY}
      - DATABASE_URL=sqlite:///./data/asteroides.db
      - ALLOWED_ORIGINS=http://localhost:5500,http://127.0.0.1:5500
      - LOG_DIR=/app/logs
    volumes:
      - asteroid_data:/app/data
      - asteroid_logs:/app/logs
    restart: unless-stopped

  frontend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5500:5500"
    command: python -m http.server 5500
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  asteroid_data:
  asteroid_logs: